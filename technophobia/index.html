<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phasmophobia Web Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="ui">
    <div>Area: <span id="area">Truck</span></div>
    <div>Sanity: <span id="sanity">100</span>%</div>
    <div>Stamina: <span id="stamina">100</span></div>
    <div>Position: <span id="position">0, 0</span></div>
    <div>Zoom: <span id="zoom">1.0</span>x</div>
</div>
<div id="instructions">
    WASD - Move | Shift - Sprint | Mouse Wheel - Zoom | Click - Spawn Ghost | P - Toggle Debug
</div>
<div id="gameOverText">
    GAME OVER - Ghost caught you!
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pathfinding@0.4.18/visual/lib/pathfinding-browser.min.js"></script>
<script type="module" src="scripts/main.js"></script>
</body>
</html>
